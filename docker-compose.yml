services:
  app:
    build:
      context: .
      target: dev
      args:
        PORT: ${PORT:-3000}
    container_name: marketscooper-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://marketscooper:marketscooper@postgres:5432/marketscooper?schema=public
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: marketscooper-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketscooper
      POSTGRES_PASSWORD: marketscooper
      POSTGRES_DB: marketscooper
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketscooper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
